<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <title>동물 친구들 마음 사전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&family=Pretendard:wght@400;600;700;800;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #6a442b;
            background-image: 
                radial-gradient(circle at 50% 30%, rgba(255,255,255,0.08) 0%, rgba(0,0,0,0.5) 100%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 4px,
                    rgba(0,0,0,0.03) 4px,
                    rgba(0,0,0,0.03) 8px
                );
            min-height: 100vh;
            color: #f8fafc;
        }

        .myeongjo {
            font-family: 'Nanum Myeongjo', serif;
        }

        .fade-in {
            animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        .square-card {
            background: white;
            border-radius: 16px;
            border: 4px solid white;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .square-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.4);
        }

        .card-perspective { perspective: 1200px; }
        .card-inner {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .card-inner.flipped { transform: rotateY(180deg); }
        .card-front, .card-back {
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        .card-back { transform: rotateY(180deg); }

        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .root-line {
            stroke-dasharray: 100;
            animation: drawRoot 1.5s ease-out forwards;
        }
        @keyframes drawRoot {
            from { stroke-dashoffset: 100; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="pb-16 text-slate-800">

            🐾 동물 친구들과 함께하는 감정 빙산

        <p class="text-sm text-white/80 mt-3 max-w-xl mx-auto leading-relaxed font-medium" id="header-desc">
            지금 내 마음의 수면 위로 솟아오른 대표 감정은 무엇인가요? 
            나와 같은 상황에 처한 동물 친구를 골라보세요.
        </p>
    </header>

            </div>
            
            <div class="flex flex-col items-center mb-0 relative" id="selected-main-card">
                </div>

            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4" id="sub-emotion-grid">
                </div>
        </section>

        <section id="step3-container" class="hidden fade-in max-w-md mx-auto mt-4">

    </main>

        function flipActiveCard(freqs) {
            document.getElementById('active-card-inner').classList.toggle('flipped');
            playHealingChime(freqs);
        }

        function saveCurrentCard() {
            const narrative = document.getElementById('card-narrative').value;
            const slogan = document.getElementById('card-slogan').value;
            const need = document.getElementById('card-need').value;

            localStorage.setItem(`animal_narrative_${currentSubEmotion.id}`, narrative);
            localStorage.setItem(`animal_slogan_${currentSubEmotion.id}`, slogan);
            localStorage.setItem(`animal_need_${currentSubEmotion.id}`, need);
            
            let savedCards = JSON.parse(localStorage.getItem('animal_saved_cards') || '[]');
            if (!savedCards.includes(currentSubEmotion.id)) {
                savedCards.push(currentSubEmotion.id);
                localStorage.setItem('animal_saved_cards', JSON.stringify(savedCards));
            }
        }

        function playHealingChime(freqs) {
            if (!window.isSoundEnabled) return;
            try {
                if (!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (window.audioCtx.state === 'suspended') window.audioCtx.resume();

                freqs.forEach((freq, idx) => {
                    const timeDelay = idx * 0.15;
                    const osc = window.audioCtx.createOscillator();
                    const gain = window.audioCtx.createGain();

                    osc.type = idx % 2 === 0 ? 'sine' : 'triangle';
                    osc.frequency.setValueAtTime(freq, window.audioCtx.currentTime + timeDelay);

                    gain.gain.setValueAtTime(0.2, window.audioCtx.currentTime + timeDelay);
                    gain.gain.exponentialRampToValueAtTime(0.001, window.audioCtx.currentTime + timeDelay + 1.8);

                    osc.connect(gain);
                    gain.connect(window.audioCtx.destination);
                    osc.start(window.audioCtx.currentTime + timeDelay);
                    osc.stop(window.audioCtx.currentTime + timeDelay + 2.0);
                });
            } catch (e) { console.log(e); }
        }

        function toggleHealingSound() {
            window.isSoundEnabled = !window.isSoundEnabled;
            const btnText = document.getElementById("sound-btn-text");
            const btn = document.getElementById("sound-btn");
            if (window.isSoundEnabled) {
                btnText.innerText = "오르골 켜짐";
                btn.classList.remove("bg-emerald-500");
                btn.classList.add("bg-emerald-600");
                playHealingChime([1046.50, 1318.51, 1567.98, 2093.00]);
            } else {
                btnText.innerText = "오르골 켜기";
                btn.classList.add("bg-emerald-500");
                btn.classList.remove("bg-emerald-600");
            }
        }

        // 2. 패들릿용 전체 데이터 복사 및 새 창 이동 처리
        function copyFormContent() {
            const savedIds = JSON.parse(localStorage.getItem('animal_saved_cards') || '[]');
            if (savedIds.length === 0) {
                alert("복사할 데이터가 없습니다. 카드를 작성해 주세요.");
                return;
            }

            let compiledText = `🐾 [동물 친구들 마음 사전 성찰 기록]\n\n`;

            savedIds.forEach(id => {
                let subInfo = null;
                let mainInfo = null;
                for (const key in emotionData) {
                    const found = emotionData[key].subs.find(s => s.id === id);
                    if (found) { subInfo = found; mainInfo = emotionData[key]; break; }
                }

                if (subInfo && mainInfo) {
                    const narrative = localStorage.getItem(`animal_narrative_${id}`) || "";
                    const slogan = localStorage.getItem(`animal_slogan_${id}`) || "";
                    const need = localStorage.getItem(`animal_need_${id}`) || "";

                    compiledText += `🦁 동물 친구: ${mainInfo.animal} (${mainInfo.shortName})\n`;
                    compiledText += `💦 진짜 속마음: ${subInfo.icon} ${subInfo.name}\n`;
                    compiledText += `🌱 나의 욕구: ${need}\n`;
                    compiledText += `📝 언제 그랬냐면: ${narrative}\n`;
                    compiledText += `📢 응원 한마디: "${slogan}"\n`;
                    compiledText += `-----------------------------------------\n\n`;
                }
            });

            // 복사 완료 시 패들릿 창 자동 이동 처리
            navigator.clipboard.writeText(compiledText).then(() => {
                alert("✨ 마음사전 결과 및 심층 성찰 파일이 자동으로 복사되었습니다!\n확인을 누르면 우리 학급 전용 공식 패들릿으로 연동 이동합니다.");
                window.open("https://padlet.com/automotive260/padlet-ncld17n0tqw4ueam", "_blank");
            }).catch(() => {
                // navigator.clipboard 대안 처리
                try {
                    const tempInput = document.createElement("textarea");
                    tempInput.value = compiledText;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempInput);
                    
                    alert("✨ 마음사전 결과 및 심층 성찰 파일이 자동으로 복사되었습니다!\n확인을 누르면 우리 학급 전용 공식 패들릿으로 연동 이동합니다.");
                    window.open("https://padlet.com/automotive260/padlet-ncld17n0tqw4ueam", "_blank");
                } catch(err) {
                    alert("자동 복사 권한 오류가 발생했습니다. 직접 복사하신 후 패들릿으로 이동합니다.");
                    window.open("https://padlet.com/automotive260/padlet-ncld17n0tqw4ueam", "_blank");
                }
            });
        }
